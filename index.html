<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ملف ناجين — التحقيقي</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#0d0d18;color:#9090c0;direction:rtl;overflow:hidden;}

/* ======= LOCK SCREEN ======= */
#lock{position:fixed;inset:0;background:#0d0d18;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:999;}
#lock h1{color:#7c6fe0;font-size:22px;letter-spacing:4px;font-weight:500;}
#lock p{color:#3a3a6a;font-size:12px;letter-spacing:2px;}
#pw-wrap{display:flex;gap:8px;}
#pw-input{background:#13132a;border:1px solid #2a2a5a;color:#c0b0ff;padding:10px 18px;border-radius:10px;font-size:15px;outline:none;width:200px;letter-spacing:3px;text-align:center;font-family:inherit;}
#pw-input:focus{border-color:#534AB7;}
#pw-btn{background:#534AB7;color:#fff;border:none;padding:10px 22px;border-radius:10px;cursor:pointer;font-size:14px;font-family:inherit;transition:background .2s;}
#pw-btn:hover{background:#7c6fe0;}
#pw-err{color:#E24B4A;font-size:12px;min-height:18px;}
#lock-icon{font-size:48px;color:#2a2a5a;margin-bottom:4px;}

/* ======= APP ======= */
#app{display:none;flex-direction:column;height:100vh;}

/* ======= TOOLBAR ======= */
#toolbar{background:#0f0f1e;border-bottom:1px solid #1a1a38;padding:6px 12px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
.tb{background:#13132a;border:1px solid #1e1e40;color:#8080b0;padding:5px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;}
.tb:hover{background:#1e1e40;color:#c0b0ff;border-color:#534AB7;}
.tb.on{background:#534AB7;color:#fff;border-color:#7c6fe0;}
.tb.danger:hover{background:#2a0505;color:#F09595;border-color:#E24B4A;}
.sep{width:1px;height:24px;background:#1a1a38;margin:0 3px;flex-shrink:0;}
#color-pick{width:30px;height:30px;border:1px solid #1e1e40;border-radius:7px;cursor:pointer;padding:3px;background:#13132a;}
#conn-dot{width:8px;height:8px;border-radius:50%;background:#E24B4A;margin-right:4px;flex-shrink:0;transition:background .3s;}
#conn-dot.ok{background:#1d9e75;}
#conn-label{font-size:11px;color:#3a3a6a;}

/* ======= CANVAS ======= */
#canvas-wrap{flex:1;overflow:auto;padding:20px;display:flex;justify-content:center;align-items:flex-start;}
#canvas{position:relative;width:2000px;min-height:1200px;background:#0a0a12;border:1px solid #1a1a38;border-radius:12px;background-image:repeating-linear-gradient(0deg,transparent,transparent 29px,#111128 29px,#111128 30px),repeating-linear-gradient(90deg,transparent,transparent 29px,#111128 29px,#111128 30px);}

/* ======= NODES ======= */
.node{position:absolute;min-width:120px;min-height:44px;padding:8px 14px;border-radius:10px;cursor:move;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;text-align:center;background:#111128;color:#fff;box-shadow:0 4px 6px rgba(0,0,0,0.3);}
.node.sel{outline:3px solid #fff; box-shadow:0 0 15px rgba(255,255,255,0.2);}
.nlabel{font-size:14px;font-weight:bold;line-height:1.4;pointer-events:none;}

/* ======= ARROWS SVG ======= */
#arrows{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}

/* ======= EDIT BAR ======= */
#editbar{background:#0f0f1e;border-top:1px solid #1a1a38;padding:7px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
#editbar label{color:#4a4a7a;font-size:11px;}
.einp{background:#0a0a12;border:1px solid #1e1e40;color:#c0b0ff;padding:5px 9px;border-radius:7px;font-size:12px;font-family:inherit;}
.einp:focus{outline:none;border-color:#534AB7;}
#ei-l{width:250px;}
#hint{color:#2a2a6a;font-size:10px;margin-right:auto;}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div id="lock-icon">🔒</div>
  <h1>ملف تحقيقي — ناجين</h1>
  <p>أدخل كلمة المرور للدخول</p>
  <div id="pw-wrap">
    <input id="pw-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')chk()"/>
    <button id="pw-btn" onclick="chk()">دخول</button>
  </div>
  <div id="pw-err"></div>
</div>

<!-- APP -->
<div id="app">
  <div id="toolbar">
    <button class="tb on" id="tool-select" onclick="setTool('select')">▷ تحديد وتحريك</button>
    <button class="tb" id="tool-arrow" onclick="setTool('arrow')">↗ ربط (سهم)</button>
    <div class="sep"></div>
    <button class="tb" onclick="addNode()">+ إضافة مربع جديد</button>
    <div class="sep"></div>
    <button class="tb danger" onclick="clearAll()">🗑 مسح الكل</button>
    <div class="sep"></div>
    <div id="conn-dot"></div>
    <span id="conn-label">جاري الاتصال...</span>
  </div>

  <div id="canvas-wrap">
    <div id="canvas" onmousedown="startDrag(event)" onmousemove="drag(event)" onmouseup="endDrag(event)">
      <svg id="arrows" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <g id="lines-group"></g>
      </svg>
      <div id="nodes-container"></div>
    </div>
  </div>

  <div id="editbar">
    <label>النص:</label>
    <input class="einp" id="ei-l" placeholder="عنوان العنصر" oninput="updLabel(this.value)"/>
    <button class="tb" onclick="delSel()">✕ حذف المربع</button>
    <span id="hint">اختر عنصراً للتعديل أو حذفه، للربط اختر (سهم) ثم اسحب من مربع لآخر</span>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 ضع إعدادات Firebase الخاصة بك هنا
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let db;
try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    document.getElementById('conn-dot').classList.add('ok');
    document.getElementById('conn-label').textContent = 'متصل بـ Firebase (مباشر)';
} catch(e) {
    document.getElementById('conn-label').textContent = 'العمل محلياً (غير متصل)';
}

const MAP_KEY = "najen_map_data";

window._fbSave = function(data){ 
    if(db) set(ref(db, MAP_KEY), data); 
};

window._fbListen = function(cb){
    if(db) {
        onValue(ref(db, MAP_KEY), snap => {
            cb(snap.exists() ? snap.val() : null);
        });
    } else {
        cb(null); // Fallback if no firebase
    }
};
</script>

<script>
/* ============================================================
   البيانات الأساسية المستخرجة من الصورة
   ============================================================ */
const defaultData = {
  nodes: {
    "n1": { id: "n1", text: "ناجين", x: 900, y: 50 },
    "n2": { id: "n2", text: "1. الزرق والرماد", x: 450, y: 150 },
    "n3": { id: "n3", text: "2. المجهولون", x: 900, y: 150 },
    "n4": { id: "n4", text: "3. أغلاط الطرفين", x: 1350, y: 150 },
    "n5": { id: "n5", text: "إلى يحرك الإشعاع", x: 1100, y: 150 },
    
    // فروع الزرق والرماد (اليسار)
    "n6": { id: "n6", text: "الزرق", x: 350, y: 250 },
    "n7": { id: "n7", text: "الرماد", x: 550, y: 250 },
    "n8": { id: "n8", text: "رجال الجبل", x: 350, y: 350 },
    "n9": { id: "n9", text: "حذرين بشكل غير منطقي", x: 350, y: 450 },
    "n10":{ id: "n10", text: "ايش هدفهم من توزيع الفيبر للافراد والمنظار", x: 350, y: 550 },
    "n11":{ id: "n11", text: "حرس الرماد", x: 550, y: 350 },
    "n12":{ id: "n12", text: "أقرب إلى الناجين", x: 550, y: 450 },

    // فروع المجهولون (الوسط)
    "n13":{ id: "n13", text: "الفضائيين", x: 600, y: 450 },
    "n14":{ id: "n14", text: "راعي الهيلي", x: 700, y: 450 },
    "n15":{ id: "n15", text: "التي تم تهديده في مكان", x: 800, y: 450 },
    "n16":{ id: "n16", text: "راكب الحصان", x: 900, y: 450 },
    "n17":{ id: "n17", text: "فاندام", x: 900, y: 350 },
    "n18":{ id: "n18", text: "ليون", x: 1000, y: 450 },
    "n19":{ id: "n19", text: "كيلر", x: 1100, y: 450 },
    "n20":{ id: "n20", text: "الي طلق الفلير", x: 1200, y: 450 },
    "n21":{ id: "n21", text: "الي معه المحلول", x: 1300, y: 450 },

    // فروع أغلاط الطرفين (اليمين)
    "n22":{ id: "n22", text: "الزرق", x: 1300, y: 250 },
    "n23":{ id: "n23", text: "الرماد", x: 1450, y: 250 },
    "n24":{ id: "n24", text: "الطلق العشوائي", x: 1300, y: 350 },
    "n25":{ id: "n25", text: "أسلوبهم الغير لائق", x: 1450, y: 350 },
    "n26":{ id: "n26", text: "توقيف الدروبات", x: 1450, y: 450 },

    // ملاحظة جانبية
    "n27":{ id: "n27", text: "الشكوك في الأشخاص", x: 1700, y: 200 }
  },
  links: [
    {from: "n1", to: "n2"}, {from: "n1", to: "n3"}, {from: "n1", to: "n4"},
    {from: "n3", to: "n5"},
    {from: "n2", to: "n6"}, {from: "n2", to: "n7"},
    {from: "n6", to: "n8"}, {from: "n8", to: "n9"}, {from: "n9", to: "n10"},
    {from: "n7", to: "n11"}, {from: "n11", to: "n12"},
    {from: "n3", to: "n13"}, {from: "n3", to: "n14"}, {from: "n3", to: "n15"},
    {from: "n3", to: "n16"}, {from: "n3", to: "n17"}, {from: "n3", to: "n18"},
    {from: "n3", to: "n19"}, {from: "n3", to: "n20"}, {from: "n3", to: "n21"},
    {from: "n4", to: "n22"}, {from: "n4", to: "n23"},
    {from: "n22", to: "n24"}, {from: "n23", to: "n25"}, {from: "n25", to: "n26"}
  ]
};

/* ============================================================
   حالة التطبيق (State)
   ============================================================ */
let mapData = { nodes: {}, links: [] };
let tool = 'select'; // select, arrow
let selId = null;
let dragNode = null;
let isDragging = false;
let offsetX = 0, offsetY = 0;
let drawLinkFrom = null;

// التحقق من كلمة المرور
function chk(){
  const v = document.getElementById('pw-input').value;
  if(v === 'snop123'){
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initMap();
  } else {
    document.getElementById('pw-err').innerText = 'كلمة المرور غير صحيحة';
  }
}

// بدء تحميل الخريطة
function initMap(){
    setTimeout(() => {
        window._fbListen((data) => {
            if(!data) {
                // إذا لم تكن هناك بيانات في قاعدة البيانات، ارفع التصميم الافتراضي
                mapData = JSON.parse(JSON.stringify(defaultData));
                syncSave();
            } else {
                mapData = data;
            }
            render();
        });
    }, 500);
}

// تغيير الأداة (تحديد أو ربط)
function setTool(t){
    tool = t;
    document.getElementById('tool-select').className = 'tb' + (t==='select'?' on':'');
    document.getElementById('tool-arrow').className = 'tb' + (t==='arrow'?' on':'');
    drawLinkFrom = null;
}

// إضافة مربع جديد
function addNode(){
    const id = 'n' + Date.now();
    mapData.nodes[id] = { id: id, text: "مربع جديد", x: Math.random()*200 + 400, y: Math.random()*200 + 200 };
    syncSave();
}

// مسح الكل
function clearAll(){
    if(confirm('هل أنت متأكد من مسح الخريطة كاملة؟')){
        mapData = { nodes: {}, links: [] };
        selId = null;
        document.getElementById('ei-l').value = '';
        syncSave();
    }
}

// اختيار عنصر
function selectNode(id){
    selId = id;
    render();
    if(id && mapData.nodes[id]){
        document.getElementById('ei-l').value = mapData.nodes[id].text;
    } else {
        document.getElementById('ei-l').value = '';
    }
}

// تعديل النص
function updLabel(val){
    if(selId && mapData.nodes[selId]){
        mapData.nodes[selId].text = val;
        render();
        syncSave();
    }
}

// حذف مربع
function delSel(){
    if(selId && mapData.nodes[selId]){
        delete mapData.nodes[selId];
        mapData.links = mapData.links.filter(l => l.from !== selId && l.to !== selId);
        selId = null;
        document.getElementById('ei-l').value = '';
        render();
        syncSave();
    }
}

// أحداث الماوس للتحريك والربط
function startDrag(e){
    const target = e.target.closest('.node');
    if(!target) {
        selectNode(null);
        return;
    }
    
    const id = target.id;
    
    if(tool === 'select'){
        selectNode(id);
        dragNode = id;
        isDragging = true;
        const rect = target.getBoundingClientRect();
        // الحساب الدقيق للمسافة داخل الـ canvas
        const canvasRect = document.getElementById('canvas').getBoundingClientRect();
        offsetX = e.clientX - canvasRect.left - mapData.nodes[id].x;
        offsetY = e.clientY - canvasRect.top - mapData.nodes[id].y;
    } 
    else if(tool === 'arrow'){
        drawLinkFrom = id;
    }
}

function drag(e){
    if(isDragging && dragNode && tool === 'select'){
        const canvasRect = document.getElementById('canvas').getBoundingClientRect();
        const nx = e.clientX - canvasRect.left - offsetX;
        const ny = e.clientY - canvasRect.top - offsetY;
        mapData.nodes[dragNode].x = nx;
        mapData.nodes[dragNode].y = ny;
        render(); // تحديث العرض محلياً بسرعة
    }
}

function endDrag(e){
    if(isDragging && tool === 'select'){
        isDragging = false;
        dragNode = null;
        syncSave(); // حفظ بعد التوقف عن السحب
    }
    if(tool === 'arrow' && drawLinkFrom){
        const target = e.target.closest('.node');
        if(target && target.id !== drawLinkFrom){
            // التحقق من عدم وجود رابط مسبق
            const exists = mapData.links.find(l => l.from === drawLinkFrom && l.to === target.id);
            if(!exists){
                mapData.links.push({from: drawLinkFrom, to: target.id});
                syncSave();
            }
        }
        drawLinkFrom = null;
        setTool('select'); // العودة لأداة التحديد
    }
}

// تحديث الواجهة (Nodes + Arrows)
function render(){
    const cont = document.getElementById('nodes-container');
    cont.innerHTML = '';
    
    // رسم المربعات
    for(const id in mapData.nodes){
        const n = mapData.nodes[id];
        const div = document.createElement('div');
        div.className = 'node' + (selId === id ? ' sel' : '');
        div.id = id;
        div.style.left = n.x + 'px';
        div.style.top = n.y + 'px';
        if(n.id === 'n1') { div.style.borderColor = '#7c6fe0'; } // ناجين لونه مميز
        else { div.style.borderColor = '#4a4a7a'; }
        
        div.innerHTML = `<div class="nlabel">${n.text}</div>`;
        cont.appendChild(div);
    }

    // رسم الأسهم (SVG)
    const svgGroup = document.getElementById('lines-group');
    svgGroup.innerHTML = '';
    mapData.links.forEach(link => {
        const fn = mapData.nodes[link.from];
        const tn = mapData.nodes[link.to];
        if(!fn || !tn) return;

        // حساب مركز كل مربع للربط
        const domF = document.getElementById(fn.id);
        const domT = document.getElementById(tn.id);
        if(!domF || !domT) return;
        
        const fx = fn.x + (domF.offsetWidth / 2);
        const fy = fn.y + (domF.offsetHeight / 2);
        const tx = tn.x + (domT.offsetWidth / 2);
        const ty = tn.y + (domT.offsetHeight / 2);

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        // خط منحني بسيط لجمالية الخريطة
        const d = `M ${fx} ${fy} C ${fx} ${(fy+ty)/2}, ${tx} ${(fy+ty)/2}, ${tx} ${ty}`;
        path.setAttribute('d', d);
        path.setAttribute('stroke', '#534AB7');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        path.setAttribute('marker-end', 'url(#ah)');
        svgGroup.appendChild(path);
    });
}

// حفظ في Firebase (مزامنة)
function syncSave(){
    window._fbSave(mapData);
}

</script>
</body>
</html>
